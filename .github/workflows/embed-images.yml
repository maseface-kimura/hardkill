name: Embed Images into HTML

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  embed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python deps
        run: pip install requests

      - name: Download and embed all images
        run: |
          python3 << 'PYEOF'
          import requests, base64, re, time

          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          # Find ALL remaining wikimedia URLs (not yet base64)
          urls = list(set(re.findall(r"'(https://upload\.wikimedia\.org/[^']+)'", html)))
          print(f"Found {len(urls)} images still needing embedding")

          ok, fail = 0, 0
          for url in urls:
              for attempt in range(3):
                  try:
                      r = requests.get(url, timeout=30, headers={
                          'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36'
                      })
                      if r.status_code == 200 and len(r.content) > 500:
                          ext = url.split('.')[-1].lower().split('?')[0]
                          mime = {
                              'jpg': 'image/jpeg', 'jpeg': 'image/jpeg',
                              'png': 'image/png', 'gif': 'image/gif',
                              'svg': 'image/svg+xml', 'webp': 'image/webp'
                          }.get(ext, 'image/jpeg')
                          b64 = base64.b64encode(r.content).decode()
                          data_uri = f'data:{mime};base64,{b64}'
                          html = html.replace(f"'{url}'", f"'{data_uri}'")
                          fname = url.split('/')[-1][:50]
                          print(f"  ✓ {fname} ({len(r.content)//1024}kb)")
                          ok += 1
                          break
                      else:
                          print(f"  ? HTTP {r.status_code} for {url.split('/')[-1][:40]} (attempt {attempt+1})")
                          time.sleep(2)
                  except Exception as e:
                      print(f"  ! Error {url.split('/')[-1][:40]}: {e} (attempt {attempt+1})")
                      time.sleep(2)
              else:
                  print(f"  ✗ FAILED after 3 attempts: {url.split('/')[-1][:40]}")
                  fail += 1
              time.sleep(0.5)

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)

          remaining = len(re.findall(r"'(https://upload\.wikimedia\.org/[^']+)'", html))
          print(f"\nDone: {ok} embedded, {fail} failed, {remaining} still external")
          PYEOF

      - name: Show file size
        run: du -sh index.html

      - name: Commit embedded HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Embed images as base64 [skip ci]"
          git push
